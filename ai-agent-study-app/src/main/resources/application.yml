server:
  port: 8090

spring:
  config:
    import: classpath:config.yml
  ai:
    agent:
      auto-config:
        enabled: true
        #        client-ids: 4101,4102,4103,4104
        client-ids: 3101,3102,3103,3104,4101,4102,4103,4104,5101,5102,5103,5104
        #        client-ids: 3101,3102,3103,3104,4101,4102,4103,4104
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          num-batch: 512
        model: nomic-embed-text
    # 添加 DeepSeek 配置
    openai:
      base-url: https://api.deepseek.com/
      api-key: sk-a0df0f93a5ac475e8c73c6e3495cfc05
      embedding-model: deepseek-embedding  # DeepSeek 的嵌入模型
      chat:
        model: deepseek-chat
  datasource:
    pgvector:
      driver-class-name: org.postgresql.Driver
      username: postgres
      password: 123
      url: jdbc:postgresql://localhost:15432/ai-rag-knowledge
      type: com.zaxxer.hikari.HikariDataSource
      # hikari连接池配置
      hikari:
        #连接池名
        pool-name: HikariCP
        #最小空闲连接数
        minimum-idle: 5
        # 空闲连接存活最大时间，默认10分钟
        idle-timeout: 600000
        # 连接池最大连接数，默认是10
        maximum-pool-size: 10
        # 此属性控制从池返回的连接的默认自动提交行为,默认值：true
        auto-commit: true
        # 此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认30分钟
        max-lifetime: 1800000
        # 数据库连接超时时间,默认30秒
        connection-timeout: 30000
        # 连接测试query
        connection-test-query: SELECT 1
    mysql:
      username: navicat_user
      password: Panzer1234@
      url: jdbc:mysql://111.228.9.124:3306/ai-agent-station?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=true
      driver-class-name: com.mysql.cj.jdbc.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        pool-name: Retail_HikariCP
        minimum-idle: 15 #最小空闲连接数量
        idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
        maximum-pool-size: 25 #连接池最大连接数，默认是10
        auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
        max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
      connection-test-query: SELECT 1
    oss:
      bucket-name: https://s3.cn-north-1.jdcloud-oss.com
      region: cn-north-1
      access-key: JDC_DBA83F9D0DE38A07D239EEAE8576
      secret-key: EE9A6C0EADC7A96325349BF03C6E5A8A
      endpoint: denny-test

# MyBatis 配置
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  type-aliases-package: denny.ai.agent.infrastructure.dao.po

# Redis
redis:
  sdk:
    config:
      host: localhost
      port: 16379
      pool-size: 10
      min-idle-size: 5
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

logging:
  level:
    web: DEBUG # 这将打印所有Controller映射的详细信息
    # 可选：同时开启Spring核心日志，看扫描过程
    org.springframework.context: DEBUG